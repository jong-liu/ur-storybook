<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ur-storybook</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      font-family: system-ui, "Noto Sans TC", sans-serif;
      background: linear-gradient(135deg, #fce7f3, #dbeafe);
      color: #1f2937;
    }
    .card {
      max-width: 32rem; margin: 1.5rem; padding: 2.5rem;
      background: rgba(255,255,255,.75); border-radius: 1.25rem;
      box-shadow: 0 10px 40px rgba(0,0,0,.12); text-align: center;
      backdrop-filter: blur(6px);
    }
    h1 { margin: 0 0 .5rem; font-size: 2rem; }
    p { margin: .4rem 0; line-height: 1.6; }
    .tag { color: #6b7280; font-size: .9rem; }
    ol { text-align: left; display: inline-block; margin-top: 1rem; line-height: 1.8; }
  </style>
</head>
<body>
  <main class="card">
    <h1>📖 ur-storybook</h1>
    <p>上傳一張角色圖片，或輸入一段簡短描述，<br />自動生成一本圖文並茂的故事書。</p>
    <ol>
      <li>輸入解析（圖片 / 描述）</li>
      <li>故事大綱生成</li>
      <li>場景擴寫</li>
      <li>插圖生成（角色一致）</li>
      <li>組 book / 匯出</li>
    </ol>
    <p class="tag">🚧 專案初始化中 · 敬請期待</p>
  </main>
</body>
</html>
