<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>📖 我的故事書工廠 · ur-storybook</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1>📖 我的故事書工廠</h1>
    <p>寫一句話，或上傳一張角色圖，就能變出一本繪本！</p>
    <nav class="topnav"><a href="character.html">🎨 想先做一個角色？→ 角色產生器</a></nav>
  </header>

  <main>
    <!-- 設定區 -->
    <section id="setup" class="card">
      <div class="setup-head">
        <p class="setup-intro">跟著下面的欄位一步一步填，就能完成你的故事 👇</p>
        <button type="button" id="loadExample" class="btn-mini">📋 載入範例</button>
      </div>

      <label class="field">
        <span class="label">📕 故事書的書名</span>
        <span class="hint">留空也沒關係，AI 會幫你取一個好聽的名字</span>
        <input type="text" id="bookName" placeholder="例如：小鯨魚波波的發光朋友" />
      </label>

      <label class="field">
        <span class="label">🦸 主角是誰？</span>
        <span class="hint">他叫什麼名字？長什麼樣子？（有上傳角色圖的話可以留空）</span>
        <input type="text" id="fChar" placeholder="例如：一隻圓滾滾、天藍色的小鯨魚，叫波波" />
      </label>

      <label class="field">
        <span class="label">🌍 故事發生在哪裡？</span>
        <span class="hint">什麼地方、什麼時候？</span>
        <input type="text" id="fSetting" placeholder="例如：在深深的藍色海底" />
      </label>

      <label class="field">
        <span class="label">✨ 發生了什麼有趣的事？</span>
        <span class="hint">這是故事的重點！主角遇到什麼、做了什麼？</span>
        <textarea id="fPlot" rows="3" placeholder="例如：波波遇見一群會發光的水母，跟著牠們一起探險，發現海底的祕密洞穴"></textarea>
      </label>

      <label class="field">
        <span class="label">🎁 最後怎麼了？</span>
        <span class="hint">結局，或想帶給小朋友的溫暖訊息（可留空）</span>
        <input type="text" id="fEnding" placeholder="例如：波波交到新朋友，學會分享與勇敢" />
      </label>

      <p id="ideaWarn" class="inline-warn hidden"></p>

      <div class="row">
        <label class="field">
          <span class="label">🎨 角色圖案（可選）</span>
          <input type="file" id="charImage" accept="image/*" />
          <div id="charPreview" class="char-preview hidden"><img alt="角色預覽" /><button type="button" id="clearImg" title="移除">✕</button></div>
          <span class="hint">上傳後，繪本會盡量畫出同一個角色。</span>
        </label>

        <label class="field small">
          <span class="label">📄 頁數</span>
          <select id="numPages">
            <option value="3">3 頁</option>
            <option value="5" selected>5 頁</option>
          </select>
        </label>

        <label class="field small">
          <span class="label">🖌️ 畫風</span>
          <select id="style">
            <option value="溫暖童趣水彩">溫暖水彩</option>
            <option value="可愛卡通粉彩">可愛卡通</option>
            <option value="夢幻森林插畫">夢幻森林</option>
            <option value="繽紛蠟筆手繪">繽紛蠟筆</option>
          </select>
        </label>
      </div>

      <button id="generate" class="btn-primary">✨ 生成我的故事書</button>
      <p id="status" class="status hidden"></p>
    </section>

    <!-- 繪本顯示區 -->
    <section id="book" class="card hidden">
      <h2 id="bookTitle"></h2>
      <div class="page-view">
        <button id="prev" class="nav" aria-label="上一頁">‹</button>
        <div class="page">
          <div class="page-img" id="pageImg"><div class="spinner">插圖生成中…</div></div>
          <p class="page-text" id="pageText"></p>
          <div class="page-tools">
            <button id="regen" class="btn-mini">🔄 重畫這一頁</button>
          </div>
        </div>
        <button id="next" class="nav" aria-label="下一頁">›</button>
      </div>
      <div class="page-dots" id="dots"></div>
      <div class="book-actions">
        <button id="exportPdf" class="btn-secondary">⬇️ 匯出 PDF</button>
        <button id="restart" class="btn-secondary">↻ 再做一本</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">ur-storybook · 由學生的想像力 + AI 一起完成</footer>

  <script src="contentSafety.js"></script>
  <script src="pdf.js"></script>
  <script src="app.js"></script>
</body>
</html>
